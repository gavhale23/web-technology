<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop | Shraddhas Trends</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(120deg, #fff1f2, #fde2e4);
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        header h1 {
            color: #e75480;
        }

        .back-btn {
            background: #e75480;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
        }

        h2 {
            text-align: center;
            margin: 30px 0;
            color: #e75480;
        }

        .products {
            padding: 20px 40px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(231, 84, 128, 0.25);
        }

        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 10px;
            transition: transform 0.4s ease;
        }

        .card:hover img {
            transform: scale(1.08);
        }

        .price {
            color: #e75480;
            font-weight: 600;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #ffe4ec;
        }
    </style>
</head>
<body>

<header>
    <h1>Shraddhas Trends</h1>

</header>

            <p class="price">₹299</p>

    </a>

    <a href="hair-accessories.html">

    © 2026 Shraddhas Trends ♡
</footer>

</body>
</html>
